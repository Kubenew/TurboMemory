name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: |
          python -m build
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted publishing - no password needed!
        # Make sure to configure at: https://pypi.org/manage/account/publishing/

      - name: Verify package published
        run: |
          sleep 5
          echo "=== Verifying package on PyPI ==="
          curl -s https://pypi.org/pypi/turbomemory/json | python3 -c "import sys,json; d=json.load(sys.stdin); print('Version:', d.get('info',{}).get('version','NOT FOUND'))" || echo "Package not found on PyPI"