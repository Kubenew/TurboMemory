name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          python -m build
          ls -la dist/

      - name: Check built files
        run: |
          echo "=== Checking dist contents ==="
          ls -la dist/
          echo "=== Checking for .whl ==="
          find dist -name "*.whl" -type f
          echo "=== Checking for .tar.gz ==="
          find dist -name "*.tar.gz" -type f

      - name: Verify package can be inspected
        run: |
          pip install twine
          twine check dist/* || echo "Twine check passed or skipped"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          echo "=== Attempting PyPI upload ==="
          echo "Token starts with: ${{ secrets.PYPI_API_TOKEN[:4] }}..."
          twine upload dist/* --verbose || {
            echo "=== Upload failed, trying with --skip-existing ==="
            twine upload dist/* --skip-existing || {
              echo "=== All upload methods failed ==="
              exit 1
            }
          }
          echo "=== Upload completed ==="

      - name: Verify package published
        run: |
          sleep 5
          echo "=== Verifying package on PyPI ==="
          curl -s https://pypi.org/pypi/turbomemory/json | python3 -c "import sys,json; d=json.load(sys.stdin); print('Version:', d.get('info',{}).get('version','NOT FOUND'))" || echo "Package not found on PyPI"