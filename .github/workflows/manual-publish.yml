name: Manual Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.5.4)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Update version in pyproject.toml
        run: |
          sed -i 's/version = ".*"/version = "${{ inputs.version }}"/' pyproject.toml
          cat pyproject.toml | head -10

      - name: Build package
        run: |
          python -m build
          ls -la dist/

      - name: Publish to PyPI (Test)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Wait for propagation
        run: sleep 10

      - name: Verify on Test PyPI
        run: |
          echo "=== Checking Test PyPI ==="
          pip install --index-url https://test.pypi.org/simple/ turbomemory==${{ inputs.version }} || echo "Not found on Test PyPI"

      - name: Publish to PyPI (Production)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No repository-url means production PyPI

      - name: Final verification
        run: |
          echo "=== Checking Production PyPI ==="
          pip install turbomemory==${{ inputs.version }} || echo "Install failed"
          pip show turbomemory